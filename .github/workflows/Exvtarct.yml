name: Move Files To Root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Move files from folder to root
        run: |
          shopt -s dotglob
          mv DroidBridgeLauncher-0.3.10/* .
          rm -rf DroidBridgeLauncher-0.3.10

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Move project files to repository root" || echo "No changes"
          git push
